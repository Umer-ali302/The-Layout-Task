<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layout Wireframe</title>
<link rel="stylesheet" href="layout-styles.css">
</head>
<body>

  <div class="frame">

    <div class="block block--red" class="divi-1"></div>
    <div class="block block--cyan"></div>

    <div class="row">
      <div class="col col--left">
        <div class="block block--yellow"></div>
        <div class="block block--orange"></div>
      </div>
      <div class="col col--right">
        <div class="block block--pink"></div>
      </div>
    </div>

    <div class="block block--gray"></div>

  </div>

</body>
</html>
